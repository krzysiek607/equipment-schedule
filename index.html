<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-dim: #1e3a5f;
      --green: #22c55e;
      --green-dim: #14532d;
      --red: #ef4444;
      --red-dim: #450a0a;
      --orange: #f59e0b;
      --orange-dim: #451a03;
      --purple: #a78bfa;
      --purple-dim: #2e1065;
      --cyan: #06b6d4;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; gap: 16px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
    .header .stats { display: flex; gap: 16px; margin-left: auto; font-size: 13px; color: var(--text-muted); }
    .header .stats span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    .columns { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .column { display: flex; flex-direction: column; overflow: hidden; }
    .column + .column { border-left: 1px solid var(--border); }

    .column-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 8px 16px; display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }
    .col-icon { font-size: 16px; }

    .column-toolbar {
      padding: 6px 16px; display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .column-content { flex: 1; overflow-y: auto; padding: 12px 16px; }

    .search-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; color: var(--text); font-size: 12px; outline: none;
      transition: border-color 0.15s;
    }
    .search-box:focus { border-color: var(--accent); }

    .filter-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .separator { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

    .view-toggle {
      margin-left: auto; display: flex; gap: 2px;
      background: var(--bg); border-radius: 6px; padding: 2px;
    }
    .view-toggle button {
      background: none; border: none; color: var(--text-muted);
      padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .view-toggle button.active { background: var(--surface); color: var(--text); }

    .group-header {
      display: flex; align-items: center; gap: 8px; padding: 8px 0 4px;
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none;
    }
    .group-header .count {
      background: var(--surface); padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 500;
    }
    .group-header .chevron { transition: transform 0.2s; font-size: 10px; }
    .group-header.collapsed .chevron { transform: rotate(-90deg); }

    .card-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .card {
      display: grid; grid-template-columns: 5px 1fr auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden; transition: all 0.15s; cursor: default;
    }
    .card:hover { border-color: #475569; background: var(--surface-hover); }
    .card .status-bar { border-radius: 6px 0 0 6px; }
    .card .status-bar.completed { background: var(--green); }
    .card .status-bar.arranged { background: var(--orange); }
    .card .status-bar.pending { background: var(--red); }
    .card .body { padding: 8px 12px; display: flex; align-items: center; gap: 10px; min-height: 40px; }
    .card .resource-name {
      font-weight: 600; font-size: 13px; min-width: 100px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .card .appointment-type {
      font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap;
    }
    .type-mot { background: var(--red-dim); color: var(--red); }
    .type-pmi { background: var(--accent-dim); color: var(--accent); }
    .type-tacho { background: var(--purple-dim); color: var(--purple); }
    .type-defect { background: var(--orange-dim); color: var(--orange); }
    .card .branch { font-size: 11px; color: var(--text-muted); }
    .card .meta {
      padding: 8px 12px; display: flex; align-items: center; gap: 14px;
      font-size: 11px; color: var(--text-muted);
    }
    .card .meta .date-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3px; color: #64748b; }
    .card .meta .date-value {
      font-size: 12px; color: var(--text); font-family: 'Cascadia Code', 'Fira Code', monospace;
    }
    .card .badges { display: flex; gap: 5px; align-items: center; }
    .badge {
      font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge-completed { background: var(--green-dim); color: var(--green); }
    .badge-arranged { background: var(--orange-dim); color: var(--orange); }
    .badge-pending { background: var(--red-dim); color: var(--red); }
    .resource-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
    .card.overdue { border-color: #991b1b; }
    .card.overdue .resource-name { color: var(--red); }
    .overdue-badge {
      background: var(--red); color: #fff; font-size: 8px; padding: 1px 4px;
      border-radius: 3px; font-weight: 700; text-transform: uppercase;
    }

    .res-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .res-table th {
      text-align: left; padding: 6px 10px; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 5;
    }
    .res-table td { padding: 6px 10px; border-bottom: 1px solid #1a2332; }
    .res-table tr:hover td { background: var(--surface-hover); }
    .res-table .truck-name {
      font-weight: 600; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px;
    }
    .res-status {
      font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .res-status-vor { background: var(--red-dim); color: var(--red); }
    .res-status-sor { background: var(--orange-dim); color: var(--orange); }
    .res-status-sub { background: var(--purple-dim); color: var(--purple); }
    .avail-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .avail-dot.yes { background: var(--green); }
    .avail-dot.no { background: var(--red); }
    .driver-name { color: var(--cyan); font-size: 11px; }
    .comment-cell { min-width: 140px; }
    .comment-display {
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      padding: 4px 6px; border-radius: 4px; min-height: 24px;
      transition: background 0.15s; display: flex; align-items: center; gap: 4px;
    }
    .comment-display:hover { background: var(--surface); }
    .clickable-cell { cursor: pointer; transition: color 0.15s; }
    .clickable-cell:hover { color: var(--accent); }
    .comment-display.empty { color: #475569; font-style: italic; }
    .comment-input {
      background: var(--bg); border: 1px solid var(--accent); border-radius: 4px;
      padding: 4px 6px; color: var(--text); font-size: 11px; width: 100%;
      outline: none; font-family: inherit;
    }
    .res-stats { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); }
    .res-stats span { display: flex; align-items: center; gap: 4px; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state h3 { font-size: 15px; margin-bottom: 4px; }

    @media (max-width: 1024px) {
      .columns { grid-template-columns: 1fr; }
      .column + .column { border-left: none; border-top: 2px solid var(--accent); }
    }
    @media (max-width: 768px) {
      .card .body { flex-wrap: wrap; gap: 4px; }
      .card .meta { flex-wrap: wrap; gap: 6px; }
    }
  </style>
</head>
<body>
<div class="header">
  <h1>Equipment Dashboard</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="columns">
  <div class="column">
    <div class="column-header"><span class="col-icon">&#128203;</span> Equipment Schedule</div>
    <div class="column-toolbar">
      <input type="text" class="search-box" id="eqSearch" placeholder="Search vehicle..." style="width:150px;">
      <div class="separator"></div>
      <button class="filter-btn" data-filter="type" data-value="Truck">Truck</button>
      <button class="filter-btn" data-filter="type" data-value="Trailer">Trailer</button>
      <div class="separator"></div>
      <button class="filter-btn" data-filter="status" data-value="pending">Pending</button>
      <button class="filter-btn" data-filter="status" data-value="arranged">Arranged</button>
      <button class="filter-btn" data-filter="status" data-value="completed">Completed</button>
      <div class="separator"></div>
      <select class="search-box" id="branchFilter" style="width:130px;cursor:pointer;">
        <option value="">All locations</option>
      </select>
      <div class="view-toggle">
        <button class="active" data-view="resource">By resource</button>
        <button data-view="timeline">By date</button>
      </div>
    </div>
    <div class="column-content" id="eqContent"></div>
  </div>
  <div class="column">
    <div class="column-header">
      <span class="col-icon">&#128666;</span> Resource Sheet
      <div class="res-stats" id="resStats" style="margin-left:auto;"></div>
    </div>
    <div class="column-toolbar">
      <input type="text" class="search-box" id="resSearch" placeholder="Search truck..." style="width:150px;">
      <div class="separator"></div>
      <button class="filter-btn res-filter" data-value="available">Available</button>
      <button class="filter-btn res-filter" data-value="unavailable">Unavailable</button>
      <div class="separator"></div>
      <button class="filter-btn res-filter" data-value="VOR">VOR</button>
      <button class="filter-btn res-filter" data-value="SOR">SOR</button>
      <button class="filter-btn res-filter" data-value="SUB">SUB</button>
    </div>
    <div class="column-content" id="resContent"></div>
  </div>
</div>

let eqFilters = { search: '', type: null, status: null, branch: '' };
let currentView = 'resource';
let collapsedGroups = new Set();
let resFilters = { search: '', availability: null, status: null };
let comments = JSON.parse(localStorage.getItem('res-comments') || '{}');

function saveComment(truckName, value) {
  const trimmed = value.trim();
  if (trimmed) { comments[truckName] = trimmed; }
  else { delete comments[truckName]; }
  localStorage.setItem('res-comments', JSON.stringify(comments));
}

function startEdit(idx, truckName) {
  const cell = document.getElementById('cmt-' + idx);
  if (!cell) return;
  const current = comments[truckName] || '';
  cell.innerHTML = '<input class="comment-input" value="' + current.replace(/"/g, '&amp;quot;') + '" />';
  const input = cell.querySelector('input');
  input.focus();
  input.addEventListener('blur', () => { saveComment(truckName, input.value); renderResources(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { input.blur(); }
    if (e.key === 'Escape') { renderResources(); }
  });
}

function flipName(name) {
  if (!name) return '-';
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return parts.slice(-1)[0] + ' ' + parts.slice(0,-1).join(' ');
  return name;
}

function setResColumnFilter(key, value) {
  if (key === 'available') {
    const target = value === 'Yes' ? 'available' : 'unavailable';
    if (resFilters.availability === target) { resFilters.availability = null; }
    else { resFilters.availability = target; }
    document.querySelectorAll('.res-filter').forEach(b => {
      if (b.dataset.value === 'available' || b.dataset.value === 'unavailable') {
        b.classList.toggle('active', resFilters.availability === b.dataset.value);
      }
    });
  } else if (key === 'status') {
    if (resFilters.status === value) { resFilters.status = null; }
    else { resFilters.status = value; }
    document.querySelectorAll('.res-filter').forEach(b => {
      if (b.dataset.value !== 'available' && b.dataset.value !== 'unavailable') {
        b.classList.toggle('active', resFilters.status === b.dataset.value);
      }
    });
  } else if (key === 'driver') {
    resFilters.search = value;
    document.getElementById('resSearch').value = value;
  }
  renderResources();
}

const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TODAY = new Date().toISOString().slice(0, 10);

function getStatus(item) {
  if (item.completed) return 'completed';
  if (item.arranged) return 'arranged';
  return 'pending';
}
function getTypeClass(type) {
  if (!type) return '';
  const t = type.toLowerCase();
  if (t.includes('mot')) return 'type-mot';
  if (t.includes('pmi')) return 'type-pmi';
  if (t.includes('tacho')) return 'type-tacho';
  if (t.includes('defect') || t.includes('breakdown')) return 'type-defect';
  return 'type-pmi';
}
function isOverdue(item) {
  if (getStatus(item) === 'completed') return false;
  const date = item.dueDate || item.bookedDate;
  return date && date < TODAY;
}
function formatDate(d) {
  if (!d) return '-';
  const p = d.split('-');
  return p[2] + '.' + p[1];
}
function formatDateFull(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return d + ' ' + WEEKDAYS[dt.getDay()];
}

function applyEqFilters() {
  return EQ_DATA.filter(item => {
    if (eqFilters.search) {
      const s = eqFilters.search.toLowerCase();
      if (![item.resourceName, item.branch, item.appointmentType, item.driver]
        .filter(Boolean).some(v => v.toLowerCase().includes(s))) return false;
    }
    if (eqFilters.type && item.resourceType !== eqFilters.type) return false;
    if (eqFilters.status && getStatus(item) !== eqFilters.status) return false;
    if (eqFilters.branch && item.branch !== eqFilters.branch) return false;
    return true;
  });
}

function renderEqStats(items) {
  const c = items.filter(i => getStatus(i) === 'completed').length;
  const a = items.filter(i => getStatus(i) === 'arranged').length;
  const p = items.filter(i => getStatus(i) === 'pending').length;
  const o = items.filter(i => isOverdue(i)).length;
  document.getElementById('stats').innerHTML =
    `<span><span class="dot" style="background:var(--green)"></span> Completed: ${c}</span>` +
    `<span><span class="dot" style="background:var(--orange)"></span> Arranged: ${a}</span>` +
    `<span><span class="dot" style="background:var(--red)"></span> Pending: ${p}</span>` +
    (o > 0 ? `<span style="color:var(--red);font-weight:600;">Overdue: ${o}</span>` : '') +
    `<span style="color:var(--text);">Total: ${items.length}</span>`;
}

function renderCard(item) {
  const status = getStatus(item);
  const od = isOverdue(item);
  const icon = item.resourceType === 'Truck' ? '\uD83D\uDE9A' : '\uD83D\uDCE6';
  const badge = status === 'completed' ? 'Done' : status === 'arranged' ? 'Arranged' : 'Pending';
  return `<div class="card ${od?'overdue':''}">
    <div class="status-bar ${status}"></div>
    <div class="body">
      <span class="resource-icon">${icon}</span>
      <span class="resource-name">${flipName(item.resourceName)}</span>
      <span class="appointment-type ${getTypeClass(item.appointmentType)}">${item.appointmentType||'-'}</span>
      <span class="branch">${item.branch||'-'}</span>
      ${item.driver?`<span class="branch" style="color:var(--cyan);">${item.driver}</span>`:''}
    </div>
    <div class="meta">
      <div><div class="date-label">Due</div><div class="date-value">${formatDate(item.dueDate)}</div></div>
      <div><div class="date-label">Booked</div><div class="date-value">${formatDate(item.bookedDate)}</div></div>
      <div class="badges">
        <span class="badge badge-${status}">${badge}</span>
        ${od?'<span class="overdue-badge">Overdue</span>':''}
      </div>
    </div>
  </div>`;
}

function renderResourceView(items) {
  const groups = {};
  items.forEach(i => { const k = i.resourceName||'Unknown'; (groups[k]||(groups[k]=[])).push(i); });
  const keys = Object.keys(groups).sort((a,b) => {
    const ap = groups[a].some(i => getStatus(i)!=='completed');
    const bp = groups[b].some(i => getStatus(i)!=='completed');
    if (ap!==bp) return ap?-1:1;
    const ao = groups[a].some(i => isOverdue(i));
    const bo = groups[b].some(i => isOverdue(i));
    if (ao!==bo) return ao?-1:1;
    return a.localeCompare(b);
  });
  if (!keys.length) return '<div class="empty-state"><h3>No results</h3>Adjust filters to see data</div>';
  return keys.map(k => {
    const gi = groups[k], col = collapsedGroups.has(k);
    const pc = gi.filter(i => getStatus(i)!=='completed').length;
    const ek = k.replace(/'/g,"\\'");
    return `<div class="group-header ${col?'collapsed':''}" onclick="toggleGroup('${ek}')">
      <span class="chevron">&#9660;</span> ${flipName(k)}
      <span class="count">${gi.length}${pc>0?' | '+pc+' active':''}</span>
    </div><div class="card-list" style="${col?'display:none':''}">${gi.map(renderCard).join('')}</div>`;
  }).join('');
}

function renderTimelineView(items) {
  const groups = {};
  items.forEach(i => { const d = i.bookedDate||i.dueDate||'No date'; (groups[d]||(groups[d]=[])).push(i); });
  const dates = Object.keys(groups).sort((a,b) => {
    if (a==='No date') return 1; if (b==='No date') return -1; return a.localeCompare(b);
  });
  if (!dates.length) return '<div class="empty-state"><h3>No results</h3>Adjust filters to see data</div>';
  return '<div class="timeline-view">'+dates.map(d => {
    const col = collapsedGroups.has(d), gi = groups[d];
    const isToday = d===TODAY, isPast = d!=='No date'&&d<TODAY;
    const cs = isToday?'color:var(--green);':isPast?'color:var(--red);':'';
    return `<div class="day-group">
      <div class="group-header ${col?'collapsed':''}" onclick="toggleGroup('${d}')">
        <span class="chevron">&#9660;</span>
        <span style="font-size:13px;font-weight:600;${cs}">${d==='No date'?d:formatDateFull(d)}${isToday?' (TODAY)':''}</span>
        <span class="count">${gi.length}</span>
      </div>
      <div class="card-list" style="${col?'display:none':''}">${gi.map(renderCard).join('')}</div>
    </div>`;
  }).join('')+'</div>';
}

function toggleGroup(k) {
  collapsedGroups.has(k)?collapsedGroups.delete(k):collapsedGroups.add(k);
  renderEquipment();
}

function renderEquipment() {
  const items = applyEqFilters();
  renderEqStats(items);
  document.getElementById('eqContent').innerHTML = currentView==='resource'?renderResourceView(items):renderTimelineView(items);
}

function populateBranches() {
  const br = [...new Set(EQ_DATA.map(i=>i.branch).filter(Boolean).filter(b=>b.trim()))].sort();
  const sel = document.getElementById('branchFilter');
  br.forEach(b => { const o=document.createElement('option'); o.value=b; o.textContent=b; sel.appendChild(o); });
}

// ─── Resource Sheet ───
function applyResFilters() {
  return RES_DATA.filter(item => {
    if (resFilters.search) {
      const s = resFilters.search.toLowerCase();
      const cmt = comments[item.truckName] || '';
      if (![item.truckName, item.defaultDriver, item.status, cmt]
        .filter(Boolean).some(v => v.toLowerCase().includes(s))) return false;
    }
    if (resFilters.availability==='available' && !item.available) return false;
    if (resFilters.availability==='unavailable' && item.available) return false;
    if (resFilters.status && item.status !== resFilters.status) return false;
    return true;
  });
}

function renderResStats(items) {
  const avail = items.filter(i => i.available).length;
  document.getElementById('resStats').innerHTML =
    `<span><span class="dot avail-dot yes"></span> Available: ${avail}</span>` +
    `<span><span class="dot avail-dot no"></span> Unavailable: ${items.length-avail}</span>` +
    `<span style="color:var(--text);">Total: ${items.length}</span>`;
}

function renderResources() {
  const items = applyResFilters();
  renderResStats(items);
  if (!items.length) {
    document.getElementById('resContent').innerHTML = '<div class="empty-state"><h3>No results</h3>Adjust filters to see data</div>';
    return;
  }
  let h = '<table class="res-table"><thead><tr><th>Truck</th><th>Available</th><th>Status</th><th>Driver</th><th>Comments</th></tr></thead><tbody>';
  items.forEach((i, idx) => {
    const sc = i.status ? 'res-status res-status-'+i.status.toLowerCase() : '';
    const tn = i.truckName||'-';
    const cmt = comments[tn] || '';
    const cmtHtml = cmt
      ? '<div class="comment-display" onclick="startEdit('+idx+',\''+tn.replace(/'/g,"\\'")+'\')">' + cmt + '</div>'
      : '<div class="comment-display empty" onclick="startEdit('+idx+',\''+tn.replace(/'/g,"\\'")+'\')">' + '+ Add note</div>';
    const availTxt = i.available ? 'Yes' : 'No';
    h += `<tr>
      <td class="truck-name">${flipName(tn)}</td>
      <td class="clickable-cell" onclick="setResColumnFilter('available','${availTxt}')"><span class="avail-dot ${i.available?'yes':'no'}"></span> ${availTxt}</td>
      <td class="clickable-cell" onclick="${i.status ? "setResColumnFilter('status','"+i.status+"')" : ''}">${i.status?'<span class="'+sc+'">'+i.status+'</span>':'-'}</td>
      <td>${i.defaultDriver?'<span class="driver-name clickable-cell" onclick="setResColumnFilter(\'driver\',\''+i.defaultDriver.replace(/'/g,"\\'")+'\')">' + i.defaultDriver + '</span>':'-'}</td>
      <td class="comment-cell" id="cmt-${idx}">${cmtHtml}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('resContent').innerHTML = h;
}

// ─── Event listeners ───
document.getElementById('eqSearch').addEventListener('input', e => { eqFilters.search=e.target.value; renderEquipment(); });
document.getElementById('branchFilter').addEventListener('change', e => { eqFilters.branch=e.target.value; renderEquipment(); });

document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v=btn.dataset.value;
    if (eqFilters.type===v) { eqFilters.type=null; btn.classList.remove('active'); }
    else { document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(b=>b.classList.remove('active')); eqFilters.type=v; btn.classList.add('active'); }
    renderEquipment();
  });
});
document.querySelectorAll('.filter-btn[data-filter="status"]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v=btn.dataset.value;
    if (eqFilters.status===v) { eqFilters.status=null; btn.classList.remove('active'); }
    else { document.querySelectorAll('.filter-btn[data-filter="status"]').forEach(b=>b.classList.remove('active')); eqFilters.status=v; btn.classList.add('active'); }
    renderEquipment();
  });
});
document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentView=btn.dataset.view; collapsedGroups.clear(); renderEquipment();
  });
});

document.getElementById('resSearch').addEventListener('input', e => { resFilters.search=e.target.value; renderResources(); });
document.querySelectorAll('.res-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.value;
    const isAv = v==='available'||v==='unavailable';
    if (isAv) {
      if (resFilters.availability===v) { resFilters.availability=null; btn.classList.remove('active'); }
      else {
        document.querySelectorAll('.res-filter').forEach(b => { if(b.dataset.value==='available'||b.dataset.value==='unavailable') b.classList.remove('active'); });
        resFilters.availability=v; btn.classList.add('active');
      }
    } else {
      if (resFilters.status===v) { resFilters.status=null; btn.classList.remove('active'); }
      else {
        document.querySelectorAll('.res-filter').forEach(b => { if(b.dataset.value!=='available'&&b.dataset.value!=='unavailable') b.classList.remove('active'); });
        resFilters.status=v; btn.classList.add('active');
      }
    }
    renderResources();
  });
});

populateBranches();
renderEquipment();
renderResources();
</script>
