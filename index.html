<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Schedule</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #334155;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-dim: #1e3a5f;
      --green: #22c55e;
      --green-dim: #14532d;
      --red: #ef4444;
      --red-dim: #450a0a;
      --orange: #f59e0b;
      --orange-dim: #451a03;
      --purple: #a78bfa;
      --purple-dim: #2e1065;
      --cyan: #06b6d4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .header .stats {
      display: flex;
      gap: 16px;
      margin-left: auto;
      font-size: 13px;
      color: var(--text-muted);
    }

    .header .stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header .stats .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ─── Toolbar ─── */
    .toolbar {
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .search-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      color: var(--text);
      font-size: 13px;
      width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box:focus { border-color: var(--accent); }

    .filter-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .separator {
      width: 1px;
      height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .view-toggle {
      margin-left: auto;
      display: flex;
      gap: 2px;
      background: var(--bg);
      border-radius: 6px;
      padding: 2px;
    }

    .view-toggle button {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-toggle button.active {
      background: var(--surface);
      color: var(--text);
    }

    /* ─── Content ─── */
    .content { padding: 16px 24px; }

    /* ─── Group headers ─── */
    .group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }

    .group-header .count {
      background: var(--surface);
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .group-header .chevron {
      transition: transform 0.2s;
      font-size: 10px;
    }

    .group-header.collapsed .chevron { transform: rotate(-90deg); }

    /* ─── Card list ─── */
    .card-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }

    .card {
      display: grid;
      grid-template-columns: 6px 1fr auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.15s;
      cursor: default;
    }

    .card:hover {
      border-color: #475569;
      background: var(--surface-hover);
    }

    .card .status-bar {
      border-radius: 8px 0 0 8px;
    }

    .card .status-bar.completed { background: var(--green); }
    .card .status-bar.arranged { background: var(--orange); }
    .card .status-bar.pending { background: var(--red); }

    .card .body {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
    }

    .card .resource-name {
      font-weight: 600;
      font-size: 14px;
      min-width: 120px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    .card .appointment-type {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }

    .type-mot { background: var(--red-dim); color: var(--red); }
    .type-pmi { background: var(--accent-dim); color: var(--accent); }
    .type-tacho { background: var(--purple-dim); color: var(--purple); }
    .type-defect { background: var(--orange-dim); color: var(--orange); }

    .card .branch {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 100px;
    }

    .card .meta {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card .meta .date-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #64748b;
    }

    .card .meta .date-value {
      font-size: 13px;
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    .card .badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-completed { background: var(--green-dim); color: var(--green); }
    .badge-arranged { background: var(--orange-dim); color: var(--orange); }
    .badge-pending { background: var(--red-dim); color: var(--red); }

    .resource-icon {
      font-size: 18px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }

    /* ─── Timeline view ─── */
    .timeline-view .day-group {
      margin-bottom: 16px;
    }

    .timeline-view .day-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--cyan);
      padding: 8px 0 4px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }

    .timeline-view .day-label .weekday {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 12px;
      margin-left: 6px;
    }

    /* ─── Overdue highlight ─── */
    .card.overdue {
      border-color: #991b1b;
    }

    .card.overdue .resource-name {
      color: var(--red);
    }

    .overdue-badge {
      background: var(--red);
      color: #fff;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state h3 { font-size: 16px; margin-bottom: 4px; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .card .body { flex-wrap: wrap; gap: 6px; }
      .card .meta { flex-wrap: wrap; gap: 8px; }
      .search-box { width: 100%; }
      .toolbar { padding: 10px 12px; }
      .content { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Equipment Schedule</h1>
  <div class="stats" id="stats"></div>
</div>

<div class="toolbar">
  <input type="text" class="search-box" id="search" placeholder="Search vehicle, location...">

  <div class="separator"></div>

  <button class="filter-btn" data-filter="type" data-value="Truck">Truck</button>
  <button class="filter-btn" data-filter="type" data-value="Trailer">Trailer</button>

  <div class="separator"></div>

  <button class="filter-btn" data-filter="status" data-value="pending">Pending</button>
  <button class="filter-btn" data-filter="status" data-value="arranged">Arranged</button>
  <button class="filter-btn" data-filter="status" data-value="completed">Completed</button>

  <div class="separator"></div>

  <select class="search-box" id="branchFilter" style="width:160px;cursor:pointer;">
    <option value="">All locations</option>
  </select>

  <div class="view-toggle">
    <button class="active" data-view="resource">By resource</button>
    <button data-view="timeline">By date</button>
  </div>
</div>

<div class="content" id="content"></div>

<script>
let DATA = [];
let filters = { search: '', type: null, status: null, branch: '' };
let currentView = 'resource';
let collapsedGroups = new Set();

const WEEKDAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TODAY = new Date().toISOString().slice(0, 10);

function getStatus(item) {
  if (item.completed) return 'completed';
  if (item.arranged) return 'arranged';
  return 'pending';
}

function getTypeClass(type) {
  if (!type) return '';
  const t = type.toLowerCase();
  if (t.includes('mot')) return 'type-mot';
  if (t.includes('pmi')) return 'type-pmi';
  if (t.includes('tacho')) return 'type-tacho';
  if (t.includes('defect') || t.includes('breakdown')) return 'type-defect';
  return 'type-pmi';
}

function isOverdue(item) {
  const status = getStatus(item);
  if (status === 'completed') return false;
  const date = item.dueDate || item.bookedDate;
  return date && date < TODAY;
}

function formatDate(d) {
  if (!d) return '-';
  const parts = d.split('-');
  return `${parts[2]}.${parts[1]}`;
}

function formatDateFull(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `${d} ${WEEKDAYS[dt.getDay()]}`;
}

function applyFilters() {
  return DATA.filter(item => {
    if (filters.search) {
      const s = filters.search.toLowerCase();
      const match = [item.resourceName, item.branch, item.appointmentType, item.driver]
        .filter(Boolean)
        .some(v => v.toLowerCase().includes(s));
      if (!match) return false;
    }
    if (filters.type && item.resourceType !== filters.type) return false;
    if (filters.status && getStatus(item) !== filters.status) return false;
    if (filters.branch && item.branch !== filters.branch) return false;
    return true;
  });
}

function renderStats(items) {
  const total = items.length;
  const completed = items.filter(i => getStatus(i) === 'completed').length;
  const arranged = items.filter(i => getStatus(i) === 'arranged').length;
  const pending = items.filter(i => getStatus(i) === 'pending').length;
  const overdue = items.filter(i => isOverdue(i)).length;

  document.getElementById('stats').innerHTML = `
    <span><span class="dot" style="background:var(--green)"></span> Completed: ${completed}</span>
    <span><span class="dot" style="background:var(--orange)"></span> Arranged: ${arranged}</span>
    <span><span class="dot" style="background:var(--red)"></span> Pending: ${pending}</span>
    ${overdue > 0 ? `<span style="color:var(--red);font-weight:600;">Overdue: ${overdue}</span>` : ''}
    <span style="color:var(--text);">Total: ${total}</span>
  `;
}

function renderCard(item) {
  const status = getStatus(item);
  const overdue = isOverdue(item);
  const icon = item.resourceType === 'Truck' ? '\uD83D\uDE9A' : '\uD83D\uDCE6';

  return `
    <div class="card ${overdue ? 'overdue' : ''}">
      <div class="status-bar ${status}"></div>
      <div class="body">
        <span class="resource-icon">${icon}</span>
        <span class="resource-name">${item.resourceName || '-'}</span>
        <span class="appointment-type ${getTypeClass(item.appointmentType)}">${item.appointmentType || '-'}</span>
        <span class="branch">${item.branch || '-'}</span>
        ${item.driver ? `<span class="branch" style="color:var(--cyan);">${item.driver}</span>` : ''}
      </div>
      <div class="meta">
        <div>
          <div class="date-label">Due</div>
          <div class="date-value">${formatDate(item.dueDate)}</div>
        </div>
        <div>
          <div class="date-label">Booked</div>
          <div class="date-value">${formatDate(item.bookedDate)}</div>
        </div>
        <div class="badges">
          <span class="badge badge-${status}">${status === 'completed' ? 'Done' : status === 'arranged' ? 'Arranged' : 'Pending'}</span>
          ${overdue ? '<span class="overdue-badge">Overdue</span>' : ''}
        </div>
      </div>
    </div>
  `;
}

function renderResourceView(items) {
  const groups = {};
  items.forEach(item => {
    const key = item.resourceName || 'Unknown';
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });

  const sortedKeys = Object.keys(groups).sort((a, b) => {
    const aPending = groups[a].some(i => getStatus(i) !== 'completed');
    const bPending = groups[b].some(i => getStatus(i) !== 'completed');
    if (aPending !== bPending) return aPending ? -1 : 1;
    const aOverdue = groups[a].some(i => isOverdue(i));
    const bOverdue = groups[b].some(i => isOverdue(i));
    if (aOverdue !== bOverdue) return aOverdue ? -1 : 1;
    return a.localeCompare(b);
  });

  if (sortedKeys.length === 0) {
    return '<div class="empty-state"><h3>No results</h3>Adjust filters to see data</div>';
  }

  return sortedKeys.map(key => {
    const groupItems = groups[key];
    const isCollapsed = collapsedGroups.has(key);
    const pendingCount = groupItems.filter(i => getStatus(i) !== 'completed').length;

    return `
      <div class="group-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleGroup('${key.replace(/'/g, "\\'")}')">
        <span class="chevron">&#9660;</span>
        ${key}
        <span class="count">${groupItems.length} ${pendingCount > 0 ? `| ${pendingCount} active` : ''}</span>
      </div>
      <div class="card-list" style="${isCollapsed ? 'display:none' : ''}">
        ${groupItems.map(renderCard).join('')}
      </div>
    `;
  }).join('');
}

function renderTimelineView(items) {
  const groups = {};
  items.forEach(item => {
    const date = item.bookedDate || item.dueDate || 'No date';
    if (!groups[date]) groups[date] = [];
    groups[date].push(item);
  });

  const sortedDates = Object.keys(groups).sort((a, b) => {
    if (a === 'No date') return 1;
    if (b === 'No date') return -1;
    return a.localeCompare(b);
  });

  if (sortedDates.length === 0) {
    return '<div class="empty-state"><h3>No results</h3>Adjust filters to see data</div>';
  }

  return '<div class="timeline-view">' + sortedDates.map(date => {
    const isCollapsed = collapsedGroups.has(date);
    const groupItems = groups[date];
    const isToday = date === TODAY;
    const isPast = date !== 'No date' && date < TODAY;

    return `
      <div class="day-group">
        <div class="group-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleGroup('${date}')">
          <span class="chevron">&#9660;</span>
          <span class="day-label" style="${isToday ? 'color:var(--green);' : isPast ? 'color:var(--red);' : ''}">
            ${date === 'No date' ? date : formatDateFull(date)}
            ${isToday ? ' (TODAY)' : ''}
          </span>
          <span class="count">${groupItems.length}</span>
        </div>
        <div class="card-list" style="${isCollapsed ? 'display:none' : ''}">
          ${groupItems.map(renderCard).join('')}
        </div>
      </div>
    `;
  }).join('') + '</div>';
}

function toggleGroup(key) {
  if (collapsedGroups.has(key)) {
    collapsedGroups.delete(key);
  } else {
    collapsedGroups.add(key);
  }
  render();
}

function render() {
  const items = applyFilters();
  renderStats(items);
  const content = document.getElementById('content');
  content.innerHTML = currentView === 'resource'
    ? renderResourceView(items)
    : renderTimelineView(items);
}

function populateBranches() {
  const branches = [...new Set(DATA.map(i => i.branch).filter(Boolean).filter(b => b.trim()))].sort();
  const select = document.getElementById('branchFilter');
  branches.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    select.appendChild(opt);
  });
}

// ─── Event listeners ───
document.getElementById('search').addEventListener('input', (e) => {
  filters.search = e.target.value;
  render();
});

document.getElementById('branchFilter').addEventListener('change', (e) => {
  filters.branch = e.target.value;
  render();
});

document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.value;
    if (filters.type === val) {
      filters.type = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('.filter-btn[data-filter="type"]').forEach(b => b.classList.remove('active'));
      filters.type = val;
      btn.classList.add('active');
    }
    render();
  });
});

document.querySelectorAll('.filter-btn[data-filter="status"]').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.value;
    if (filters.status === val) {
      filters.status = null;
      btn.classList.remove('active');
    } else {
      document.querySelectorAll('.filter-btn[data-filter="status"]').forEach(b => b.classList.remove('active'));
      filters.status = val;
      btn.classList.add('active');
    }
    render();
  });
});

document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    collapsedGroups.clear();
    render();
  });
});
